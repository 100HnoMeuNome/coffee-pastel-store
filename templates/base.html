<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Café & Pastelaria{% endblock %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Georgia', serif;
            background: #fdf6ec;
            color: #3b2a1a;
            min-height: 100vh;
        }

        /* Nav */
        nav {
            background: #3b2a1a;
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        nav .brand {
            font-size: 1.4rem;
            color: #f5c842;
            font-weight: bold;
            text-decoration: none;
            letter-spacing: 1px;
        }
        nav ul {
            list-style: none;
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }
        nav ul li a {
            color: #e8d5b7;
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.2s;
        }
        nav ul li a:hover { color: #f5c842; }
        nav .user-badge {
            background: #f5c842;
            color: #3b2a1a;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
        }

        /* Main container */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        /* Cards */
        .card {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        /* Buttons */
        .btn {
            display: inline-block;
            padding: 10px 24px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            font-family: inherit;
            text-decoration: none;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.88; }
        .btn-primary { background: #c0392b; color: white; }
        .btn-secondary { background: #3b2a1a; color: #f5c842; }
        .btn-outline { background: transparent; border: 2px solid #3b2a1a; color: #3b2a1a; }

        /* Forms */
        .form-group { margin-bottom: 1.2rem; }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.9rem;
            color: #5a3e28;
            font-weight: bold;
        }
        .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #e0cbb0;
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            background: #fdf6ec;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #c0392b;
        }

        /* Alerts */
        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 1.2rem;
            font-size: 0.95rem;
        }
        .alert-error { background: #fdecea; border-left: 4px solid #c0392b; color: #7b1a14; }
        .alert-success { background: #eafaf1; border-left: 4px solid #27ae60; color: #1a6b3a; }

        footer {
            text-align: center;
            padding: 2rem;
            color: #8a6a4a;
            font-size: 0.85rem;
            border-top: 1px solid #e0cbb0;
            margin-top: 4rem;
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
<nav>
    <a href="{{ url_for('index') }}" class="brand">☕ Café & Pastelaria</a>
    <ul>
        <li><a href="{{ url_for('menu') }}">Menu</a></li>
        {% if user %}
            <li><a href="{{ url_for('chat') }}">AI Barista</a></li>
            <li><span class="user-badge">{{ user }}</span></li>
            <li><a href="{{ url_for('logout') }}">Logout</a></li>
        {% else %}
            <li><a href="{{ url_for('login') }}">Login</a></li>
            <li><a href="{{ url_for('register') }}">Register</a></li>
        {% endif %}
    </ul>
</nav>

{% block content %}{% endblock %}

<footer>
    &copy; 2025 Café & Pastelaria — Freshly brewed, freshly fried.
</footer>
</body>
</html>
